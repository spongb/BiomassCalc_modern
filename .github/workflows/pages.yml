name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: ./modernized-frontend

      - name: Build
        run: npm run build
        working-directory: ./modernized-frontend

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./modernized-frontend/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
